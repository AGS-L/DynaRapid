plugins {
    id 'java-library'
}

dependencies {
   api project(':RapidWright')
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
}

task GenerateDesign(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    main = 'ch.agsl.dynarapid.GenerateDesign'
    maxHeapSize = '6G'
}

task run(type: JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    main = System.getProperty('main')
    maxHeapSize = '6G'
}
